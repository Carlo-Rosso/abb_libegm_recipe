name: Build and Publish Conda Packages

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PREFIX_CHANNEL: iit-da
  PREFIX_API_KEY: ${{ secrets.PREFIX_DEV_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    name: ${{ matrix.target_platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_platform: linux-64
          - os: windows-latest
            target_platform: win-64
          - os: ubuntu-24.04-arm
            target_platform: linux-aarch64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.39.0
          run-install: false

      - name: Build recipe
        shell: bash
        run: |
          if [ "${{ matrix.target_platform }}" == "win-64" ]; then
            echo 'c_compiler: [vs2022_win-64]' > variant_config.yaml
            echo 'cxx_compiler: [vs2022_win-64]' >> variant_config.yaml
            pixi exec rattler-build build --recipe recipe.yaml -m variant_config.yaml --target-platform "${{ matrix.target_platform }}" --output-dir output
          else
            pixi exec rattler-build build --recipe recipe.yaml --target-platform "${{ matrix.target_platform }}" --output-dir output
          fi

      - name: Upload to prefix.dev
        shell: bash
        run: |
          pixi exec rattler-build upload prefix -c "${PREFIX_CHANNEL}" output/*/*.conda
